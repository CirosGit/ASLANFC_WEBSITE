[build]
  publish = "."

# Serve every file exactly as uploaded. This turns OFF Netlify's "asset
# optimization" (Pretty URLs), which was stripping ".html" from filenames and
# making the shared page-pieces (Nav.dc.html, Footer.dc.html, …) unreachable —
# which is why only the hero photo showed and nothing else rendered.
[build.processing]
  skip_processing = true

# Prevent browsers/CDN from serving a stale cached copy of the site on first
# visit. Without this, visitors could land on an old build (fake schedule,
# blank sponsor tiles) until a second navigation forced a re-fetch.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
